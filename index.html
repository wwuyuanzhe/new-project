      if (/会议|公司|开会|见客|工作/.test(title)) {
        return "准备手机、电脑、文件、包和出门衣物，提前确认管家陈先生的用车安排。";
      }
      if (/音乐|钢琴|课|学习|培训|舞蹈|运动|篮球|游泳|网球|高尔夫/.test(title)) {
        return `准备${person.name}上课需要的书包、教材、乐器或水杯，提前确认接送时间。`;
      }
      return location === "none"
        ? "提前确认时间、随身物品和是否需要接送。"
        : `提前确认${locationById(location)}、随身物品和是否需要接送。`;
    }

    function renderTasks() {
      const list = document.getElementById("taskList");
      const title = document.getElementById("taskPanelTitle");
      const selected = memberById(state.selectedMember);
      const rangeText = !isWeekRange()
        ? (appLanguage === "en" ? "Selected day" : "当天")
        : (appLanguage === "en" ? "This week" : "本周");
      title.textContent = state.selectedMember === "all"
        ? `${rangeText}${appLanguage === "en" ? " tasks" : "任务"}`
        : `${selected.name}${appLanguage === "en" ? ` ${rangeText} tasks` : `的${rangeText}任务`}`;
      list.innerHTML = "";
      const tasks = visibleTasks();

      if (!tasks.length) {
        list.innerHTML = `<div class="empty">这里暂时没有任务。妈妈添加后，对应的人就能看到。</div>`;
        return;
      }

      if (state.viewMode === "visual") {
        renderVisualTasks(list, tasks);
        return;
      }

      renderTaskItems(list, tasks);
    }

    function renderTaskItems(list, tasks) {
      const renderedGroups = new Set();
      tasks.forEach(task => {
        if (state.selectedMember === "all" && task.groupId) {
          if (renderedGroups.has(task.groupId)) return;
          renderedGroups.add(task.groupId);
          const groupTasks = tasks.filter(item => item.groupId === task.groupId);
          list.appendChild(createTaskGroup(groupTasks));
          return;
        }
        list.appendChild(createTaskCard(task));
      });
    }

    function createTaskGroup(groupTasks) {
      const group = document.createElement("section");
      group.className = "task-group";
      const sorted = [...groupTasks].sort((a, b) => a.time.localeCompare(b.time));
      const first = sorted[0];
      const relations = sorted.map(task => {
        const label = task.relationLabel || memberById(task.assignee).name;
        return `<span class="relation-chip">${label} · ${task.time}</span>`;
      }).join("");
      group.innerHTML = `
        <div class="task-group-head">
          <h3>${first.groupTitle || first.title}</h3>
          <div class="relation-strip">${relations}</div>
        </div>
      `;
      sorted.forEach(task => group.appendChild(createTaskCard(task)));
      return group;
    }

    function createTaskCard(task) {
        const assignee = memberById(task.assignee);
        const prep = task.prep || suggestPrep(task.title, task.location);
        const locationBadge = task.location && task.location !== "none"
          ? `<span class="badge">${locationById(task.location)}</span>`
          : "";
        const followUpBadge = shouldShowFollowUp(task)
          ? `<span class="badge">${appLanguage === "en" ? "Follow-up" : "跟进人"}：${followUpText(task.followUp || inferFollowUp(task))}</span>`
          : "";
        const dateBadge = isWeekRange() ? `<span class="badge">${dateShortText(task.date || todayISO())}</span>` : "";
        const card = document.createElement("article");
        card.className = `task ${task.urgent ? "urgent" : ""} ${task.status}`;
        card.innerHTML = `
          <div class="task-top">
            <div>
              <h3 class="task-title">${task.title}</h3>
              <div class="task-meta">
                ${dateBadge}
                <span class="badge">${task.time}</span>
                <span class="badge">${assignee.name}</span>
                ${locationBadge}
                ${followUpBadge}
              </div>
            </div>
            <span class="badge status ${task.status === "done" ? "done" : ""}">${statusText(task.status)}</span>
          </div>
          <div class="prep-line">${appLanguage === "en" ? "15-min prep" : "开始前 15 分钟提醒"}：${prep}</div>
          <div class="task-actions">
            <button class="action" type="button" data-action="doing">${appLanguage === "en" ? "Start" : "开始"}</button>
            <button class="action" type="button" data-action="done">${appLanguage === "en" ? "Done" : "完成"}</button>
            <button class="action warn" type="button" data-action="feedback">${appLanguage === "en" ? "Feedback" : "内容反馈"}</button>
            ${task.assignee === "driver" ? `<button class="action" type="button" data-action="assign">分配</button>` : ""}
            <button class="action" type="button" data-action="delete">${appLanguage === "en" ? "Delete" : "删除"}</button>
          </div>
        `;
        card.querySelectorAll("button").forEach(button => {
          button.addEventListener("click", () => updateTask(task.id, button.dataset.action));
        });
        return card;
    }

    function renderWorkerToday() {
      const panel = document.getElementById("workerTodayPanel");
      if (!isSimpleWorker(state.selectedMember)) {
        panel.hidden = true;
        return;
      }
      panel.hidden = false;
      const member = memberById(state.selectedMember);
      const content = document.getElementById("workerTodayContent");
      document.getElementById("workerTodayTitle").textContent = `${member.name}的今天`;
      const tasks = state.tasks
        .filter(task => task.assignee === state.selectedMember && (task.date || todayISO()) === state.selectedDate)
        .filter(task => task.status !== "done")
        .sort((a, b) => a.time.localeCompare(b.time));
      const nowMinutes = new Date().getHours() * 60 + new Date().getMinutes();
      const current = tasks.find(task => timeToMinutes(task.time || "09:00") <= nowMinutes) || tasks[0];
      const next = tasks.find(task => current && task.id !== current.id && timeToMinutes(task.time || "09:00") >= timeToMinutes(current.time || "09:00"));

      if (!current) {
        content.innerHTML = `<div class="empty">今天暂时没有需要处理的事项。</div>`;
        return;
      }

      content.innerHTML = `
        <div class="worker-now">
          <span class="worker-mini-label">现在要做</span>
          <h3>${current.time} · ${current.title}</h3>
          <div class="task-meta">
            <span class="badge">${locationById(current.location)}</span>
            <span class="badge">${statusText(current.status)}</span>
          </div>
          <div class="prep-line">准备：${current.prep || suggestPrep(current.title, current.location)}</div>
          <div class="task-actions">
            <button class="action" type="button" data-worker-action="done" data-task-id="${current.id}">完成</button>
            <button class="action warn" type="button" data-worker-action="feedback" data-task-id="${current.id}">内容反馈</button>
          </div>
        </div>
        <div class="worker-next">
          <span class="worker-mini-label">下一个</span>
          <strong>${next ? `${next.time} · ${next.title}` : "今天后面暂无事项"}</strong>
          ${next ? `<span class="dashboard-note">${locationById(next.location)} · ${next.prep || suggestPrep(next.title, next.location)}</span>` : ""}
        </div>
      `;

      content.querySelectorAll("[data-worker-action]").forEach(button => {
        button.addEventListener("click", () => updateTask(button.dataset.taskId, button.dataset.workerAction));
      });
    }

    function renderVisualTasks(container, tasks) {
      container.innerHTML = "";
      const board = document.createElement("div");
      board.className = "visual-board";
      const groups = state.selectedMember === "all"
        ? members.filter(member => member.id !== "all" && tasks.some(task => task.assignee === member.id))
        : [memberById(state.selectedMember)];

      groups.forEach(member => {
        const ownTasks = tasks.filter(task => task.assignee === member.id);
        if (!ownTasks.length) return;
        const done = ownTasks.filter(task => task.status === "done").length;
        const percent = Math.round((done / ownTasks.length) * 100);
        const card = document.createElement("section");
        card.className = "visual-card";
        card.innerHTML = `
          <h3>${member.name}</h3>
          <div class="visual-meter"><span style="width:${percent}%"></span></div>
          <div class="routine-meta">${done}/${ownTasks.length} ${appLanguage === "en" ? "done" : "已完成"}</div>
        `;
        ownTasks.slice(0, 5).forEach(task => {
          const item = document.createElement("div");
          item.className = "visual-task";
          item.innerHTML = `
            <strong>${isWeekRange() ? `${dateShortText(task.date || todayISO())} · ` : ""}${task.time} · ${task.title}</strong>
            <span>${task.location === "none" ? locationById(task.location) : locationById(task.location)} · ${statusText(task.status)}</span>
            ${shouldShowFollowUp(task) ? `<span>${appLanguage === "en" ? "Follow-up" : "跟进人"}：${followUpText(task.followUp || inferFollowUp(task))}</span>` : ""}
            <span>${appLanguage === "en" ? "Prep" : "准备"}：${task.prep || suggestPrep(task.title, task.location)}</span>
          `;
          card.appendChild(item);
        });
        board.appendChild(card);
      });
      container.appendChild(board);
    }

    function updateTask(id, action) {
      const task = state.tasks.find(item => item.id === id);
      if (!task) return;
      if (["todo", "doing", "done"].includes(action)) {
        task.status = action;
      }
      if (action === "feedback") {
        const text = window.prompt(`请输入关于「${task.title}」的反馈内容`);
        if (text && text.trim()) {
          addFeedback(task.assignee, `关于「${task.title}」：${text.trim()}`);
          state.notices.unshift({
            id: uid(),
            text: `${memberById(task.assignee).name} 提交了事项反馈：「${task.title}」。`,
            time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
          });
        }
      }
      if (action === "assign") {
        const text = window.prompt("分配给谁？可以写：佣人A、佣人B、佣人C、阿磊、齐厨师、KK、妈妈、爸爸、Angela、Alisa、Aron");
        if (text && text.trim()) {
          const nextAssignee = detectAssignablePerson(text.trim());
          task.assignee = nextAssignee;
          task.relationLabel = `${memberById(nextAssignee).name}执行`;
          state.notices.unshift({
            id: uid(),
            text: `管家陈先生把「${task.title}」分配给 ${memberById(nextAssignee).name}。`,
            time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
          });
          notifyAssignee(nextAssignee, task.title);
        }
      }
      if (action === "delete") {
        state.notices.unshift({
          id: uid(),
          text: `删除事项：${memberById(task.assignee).name} 的「${task.title}」。`,
          time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
        });
        state.tasks = state.tasks.filter(item => item.id !== id);
      }
      save();
      render();
    }

    function renderSummary() {
      const dateTasks = state.tasks.filter(task => dateInRange(task.date || todayISO()));
      const progress = document.getElementById("progressList");
      progress.innerHTML = "";
      members
        .filter(member => member.id !== "all" && member.id !== "mom")
        .slice()
        .sort((a, b) => personSortIndex(a.id) - personSortIndex(b.id))
        .forEach(member => {
        const ownTasks = dateTasks.filter(task => task.assignee === member.id);
        const done = ownTasks.filter(task => task.status === "done").length;
        const percent = ownTasks.length ? Math.round((done / ownTasks.length) * 100) : 0;
        const row = document.createElement("div");
        row.className = "progress-row clickable";
        row.innerHTML = `
          <strong>${member.name}</strong>
          <span class="bar"><span class="fill" style="width:${percent}%"></span></span>
          <span>${done}/${ownTasks.length}</span>
        `;
        row.addEventListener("click", () => {
          openTaskSummary(`${member.name}未完成事项`, ownTasks.filter(task => task.status !== "done"));
        });
        progress.appendChild(row);
      });
      renderDaypartList(dateTasks);
    }

    function renderDaypartList(tasks) {
      const list = document.getElementById("daypartList");
      list.innerHTML = "";
      const parts = [
        { label: "上午", from: 0, to: 12 * 60 },
        { label: "下午", from: 12 * 60, to: 18 * 60 },
        { label: "晚上", from: 18 * 60, to: 24 * 60 }
      ];
      parts.forEach(part => {
        const partTasks = tasks.filter(task => {
          const minutes = timeToMinutes(task.time || "09:00");
          return minutes >= part.from && minutes < part.to;
        }).sort((a, b) => a.time.localeCompare(b.time));
        const row = document.createElement("div");
        row.className = "dashboard-row clickable";
        row.innerHTML = `<strong>${part.label}</strong><span class="badge">${partTasks.length} 项</span>`;
        row.addEventListener("click", () => openTaskSummary(`${part.label}事项`, partTasks, { groupByPerson: true }));
        list.appendChild(row);
      });
    }

    function personSortIndex(memberId) {
      const important = ["daughter1", "daughter2", "son", "driver", "driverLei", "helperA", "helperB", "helperC", "chef", "kk", "grandma", "grandpa", "dad", "mom"];
      const index = important.indexOf(memberId);
      return index === -1 ? important.length : index;
    }

    function renderGroupedTaskSummary(content, tasks) {
      const grouped = new Map();
      tasks
        .slice()
        .sort((a, b) => personSortIndex(a.assignee) - personSortIndex(b.assignee) || (a.time || "").localeCompare(b.time || ""))
        .forEach(task => {
          if (!grouped.has(task.assignee)) grouped.set(task.assignee, []);
          grouped.get(task.assignee).push(task);
        });
      grouped.forEach((personTasks, assignee) => {
        const member = memberById(assignee);
        const group = document.createElement("div");
        group.className = "sheet-person-group";
        const openCount = personTasks.filter(task => task.status !== "done").length;
        group.innerHTML = `
          <div class="sheet-person-title">
            <span>${member.name}</span>
            <span class="badge">${openCount} 未完成 / ${personTasks.length} 项</span>
          </div>
        `;
        personTasks
          .slice()
          .sort((a, b) => (a.time || "").localeCompare(b.time || ""))
          .forEach(task => {
            const item = document.createElement("div");
            item.className = "notice sheet-task-item";
            item.innerHTML = `
              <span class="sheet-task-time">${task.time || "--:--"}</span>
              <span class="sheet-task-title">${task.title}（${statusText(task.status)}）</span>
            `;
            group.appendChild(item);
          });
        content.appendChild(group);
      });
    }

    function openTaskSummary(title, tasks, options = {}) {
      const sheet = document.getElementById("overviewSheet");
      const content = document.getElementById("overviewSheetContent");
      document.getElementById("overviewSheetTitle").textContent = title;
      content.innerHTML = "";
      if (!tasks.length) {
        content.innerHTML = `<div class="empty">这里暂时没有事项。</div>`;
      } else if (options.groupByPerson) {
        renderGroupedTaskSummary(content, tasks);
      } else {
        tasks.forEach(task => {
          const item = document.createElement("div");
          item.className = "notice";
          item.textContent = `${task.time}  ${memberById(task.assignee).name}：${task.title}（${statusText(task.status)}）`;
          content.appendChild(item);
        });
      }
      sheet.hidden = false;
    }

    function todayTasks() {
      return state.tasks.filter(task => (task.date || todayISO()) === todayISO());
    }

    function feedbackCreatedAt(feedback) {
      return feedback.createdAt || 1;
    }

    function unreadFeedbacks() {
      return state.feedbacks.filter(feedback => feedbackCreatedAt(feedback) > state.feedbackReadAt);
    }

    function renderMomDashboard() {
      const dashboard = document.getElementById("momDashboard");
      const dot = document.getElementById("feedbackUnreadDot");
      const canSee = state.selectedMember === "all" || state.selectedMember === "mom";
      dashboard.style.display = canSee ? "" : "none";
      dot.hidden = !canSee;
      if (!canSee) return;

      const tasks = todayTasks();
      const openTasks = tasks.filter(task => task.status !== "done");
      const todayFeedbacks = unreadFeedbacks();
      const now = new Date();
      const nowMinutes = now.getHours() * 60 + now.getMinutes();
      const upcoming = openTasks
        .filter(task => {
          const start = timeToMinutes(task.time || "09:00");
          return start >= nowMinutes && start <= nowMinutes + 90;
        })
        .sort((a, b) => a.time.localeCompare(b.time))
        .slice(0, 3);
      const unread = unreadFeedbacks();
      const latestFeedback = state.feedbacks[0];

      document.getElementById("unreadFeedbackCount").textContent = unread.length;
      document.getElementById("todayIssueCount").textContent = tasks.length;
      document.getElementById("todayOpenCount").textContent = openTasks.length;
      document.getElementById("upcomingCount").textContent = upcoming.length;
      dot.textContent = unread.length;
      dot.hidden = unread.length === 0;

      document.getElementById("latestFeedbackText").textContent = latestFeedback
        ? `${memberById(latestFeedback.from).name}：${latestFeedback.text}`
        : "暂无新的私密反馈";
      document.getElementById("todayIssueText").textContent = tasks.length
        ? `上午 ${tasks.filter(task => timeToMinutes(task.time || "09:00") < 12 * 60).length} / 下午 ${tasks.filter(task => timeToMinutes(task.time || "09:00") >= 12 * 60 && timeToMinutes(task.time || "09:00") < 18 * 60).length} / 晚上 ${tasks.filter(task => timeToMinutes(task.time || "09:00") >= 18 * 60).length}`
        : "今天暂无事项";
      document.getElementById("todayBusyText").textContent = openTasks.length
        ? `${new Set(openTasks.map(task => task.assignee)).size} 个人今天还有事项`
        : "今天暂时没有待办";
      document.getElementById("upcomingText").textContent = upcoming.length
        ? `${upcoming[0].time} ${memberById(upcoming[0].assignee).name}：${upcoming[0].title}`
        : "暂无即将开始事项";

      const focus = document.getElementById("momFocusList");
      focus.innerHTML = "";
      const busyPeople = members
        .filter(member => member.id !== "all")
        .map(member => ({
          member,
          total: tasks.filter(task => task.assignee === member.id).length,
          open: openTasks.filter(task => task.assignee === member.id).length
        }))
        .filter(item => item.total > 0)
        .sort((a, b) => b.open - a.open || b.total - a.total)
        .slice(0, 4);

      const focusRows = [
        ...upcoming.map(task => ({
          title: `${task.time} 马上开始：${task.title}`,
          value: memberById(task.assignee).name
        })),
        ...todayFeedbacks.slice(0, 2).map(feedback => ({
          title: `反馈：${feedback.text}`,
          value: memberById(feedback.from).name
        })),
        ...busyPeople.map(item => ({
          title: `${item.member.name} 今天有 ${item.total} 项`,
          value: `${item.open} 未完成`
        }))
      ].slice(0, 6);

      if (!focusRows.length) {
        focus.innerHTML = `<div class="empty">今天目前很清爽，没有需要妈妈马上处理的提醒。</div>`;
        return;
      }

      focusRows.forEach(row => {
        const item = document.createElement("div");
        item.className = "dashboard-row";
        item.innerHTML = `<strong>${row.title}</strong><span class="badge">${row.value}</span>`;
        focus.appendChild(item);
      });

      document.querySelector(".dashboard-card.feedback-alert").onclick = () => {
        openFeedbackSummary(unread.length ? unread : state.feedbacks);
      };
      document.querySelector(".dashboard-card.alert").onclick = () => {
        openTaskSummary("今天全部事项", tasks, { groupByPerson: true });
      };
    }

    function openFeedbackSummary(feedbacks) {
      const sheet = document.getElementById("overviewSheet");
      const content = document.getElementById("overviewSheetContent");
      document.getElementById("overviewSheetTitle").textContent = "私密反馈";
      content.innerHTML = "";
      if (!feedbacks.length) {
        content.innerHTML = `<div class="empty">暂无私密反馈。</div>`;
      } else {
        feedbacks.forEach(feedback => {
          const item = document.createElement("div");
          item.className = "feedback";
          item.textContent = `${feedback.time}  ${memberById(feedback.from).name}：${feedback.text}`;
          content.appendChild(item);
        });
      }
      sheet.hidden = false;
    }

    function renderNotices() {
      const list = document.getElementById("noticeList");
      list.innerHTML = "";
      const notices = state.notices.slice(0, 10);
      if (!notices.length) {
        list.innerHTML = `<div class="empty">新事项、准备提醒和反馈提示会出现在这里。</div>`;
        return;
      }
      notices.forEach(notice => {
        const item = document.createElement("div");
        item.className = "notice";
        item.textContent = `${notice.time}  ${notice.text}`;
        list.appendChild(item);
      });
    }

    function renderPrivateFeedback() {
      const head = document.getElementById("privateFeedbackHead");
      const list = document.getElementById("privateFeedbackList");
      const canSee = state.selectedMember === "all" || state.selectedMember === "mom";
      head.style.display = canSee ? "" : "none";
      list.style.display = canSee ? "" : "none";
      if (!canSee) return;
      list.innerHTML = "";
      if (!state.feedbacks.length) {
        list.innerHTML = `<div class="empty">这里是只给妈妈看的反馈。</div>`;
        return;
      }
      state.feedbacks.slice(0, 8).forEach(feedback => {
        const item = document.createElement("div");
        item.className = "feedback";
        item.textContent = `${feedback.time}  ${memberById(feedback.from).name}：${feedback.text}`;
        list.appendChild(item);
      });
    }

    function renderAddResult() {
      const list = document.getElementById("addResultList");
      if (!list) return;
      const recent = state.notices.slice(0, 5);
      list.innerHTML = "";
      if (!recent.length) {
        list.innerHTML = `<div class="empty">添加、删除和反馈后的结果会显示在这里。</div>`;
        return;
      }
      recent.forEach(notice => {
        const item = document.createElement("div");
        item.className = "notice";
        item.textContent = `${notice.time}  ${notice.text}`;
        list.appendChild(item);
      });
    }

    function renderMobileShell() {
      document.body.classList.toggle("mobile-tab-overview", state.mobileTab === "overview");
      document.body.classList.toggle("mobile-tab-add", state.mobileTab === "add");
      document.body.classList.toggle("mobile-tab-member", state.mobileTab === "member");
      document.querySelectorAll("[data-mobile-tab]").forEach(button => {
        button.classList.toggle("active", button.dataset.mobileTab === state.mobileTab);
      });
    }

    function renderFilters() {
      document.querySelectorAll(".chip").forEach(button => {
        if (button.dataset.range) {
          button.classList.toggle("active", button.dataset.range === state.rangeMode);
        }
        if (button.dataset.filter) {
          button.classList.toggle("active", button.dataset.filter === state.filter);
        }
        if (button.dataset.view) {
          button.classList.toggle("active", button.dataset.view === state.viewMode);
        }
      });
      document.querySelectorAll(".view-option").forEach(button => {
        button.classList.toggle("active", button.dataset.view === state.viewMode);
      });
      document.querySelectorAll("[data-lang]").forEach(button => {
        button.classList.toggle("active", button.dataset.lang === appLanguage);
      });
    }

    function render() {
      try {
        document.getElementById("todayText").textContent = selectedDateText();
        document.getElementById("currentDateInput").value = state.selectedDate;
        renderMembers();
        renderFilters();
        renderComposerContext();
        renderActionTabs();
        renderRoutines();
        applySimpleWorkerLayout();
        renderWorkerToday();
        renderTasks();
        renderSummary();
        renderMomDashboard();
        renderNotices();
        renderPrivateFeedback();
        renderAddResult();
        renderMobileShell();
        renderNaturalContext();
      } catch (error) {
        const list = document.getElementById("taskList");
        if (list) {
          list.innerHTML = `<div class="empty">页面显示遇到问题：${error.message}</div>`;
        }
        throw error;
      }
    }

    document.getElementById("currentDateInput").value = state.selectedDate;
    renderAssignees();
    renderLocations();
    render();

    document.getElementById("currentDateInput").addEventListener("change", event => {
      state.selectedDate = event.target.value || todayISO();
      document.getElementById("scheduleDate").value = state.selectedDate;
      render();
      checkPrepReminders();
    });

    document.getElementById("prevDateBtn").addEventListener("click", () => {
      state.selectedDate = addDays(state.selectedDate, -1);
      document.getElementById("scheduleDate").value = state.selectedDate;
      render();
      checkPrepReminders();
    });

    document.getElementById("nextDateBtn").addEventListener("click", () => {
      state.selectedDate = addDays(state.selectedDate, 1);
      document.getElementById("scheduleDate").value = state.selectedDate;
      render();
      checkPrepReminders();
    });

    document.querySelectorAll("[data-lang]").forEach(button => {
      button.addEventListener("click", () => {
        appLanguage = button.dataset.lang;
        render();
      });
    });

    document.getElementById("naturalForm").addEventListener("submit", event => {
      event.preventDefault();
      const text = document.getElementById("naturalText").value.trim();
      if (!text) return;
      parseNaturalRequest(text, currentSpeakerId());
      document.getElementById("naturalText").value = "";
      save();
      render();
    });

    document.getElementById("linkedScheduleForm").addEventListener("submit", event => {
      event.preventDefault();
      const title = document.getElementById("scheduleTitle").value.trim();
      if (!title) return;
      const personIds = selectedValues(document.getElementById("schedulePerson")).filter(id => id !== "all");
      const executors = selectedValues(document.getElementById("scheduleCompanion"));
      const companionIds = executors.length ? executors : ["none"];
      const date = document.getElementById("scheduleDate").value || state.selectedDate;
      personIds.forEach(personId => {
        companionIds.forEach(companionId => addLinkedSchedule({
          personId,
          title,
          time: document.getElementById("scheduleTime").value || "09:00",
          location: document.getElementById("scheduleLocation").value,
          rideMode: document.getElementById("scheduleRide").value,
          companionId,
          driverId: document.getElementById("scheduleDriver").value,
          date,
          suppressNotice: personIds.length * companionIds.length > 1
        }));
      });
      state.notices.unshift({
        id: uid(),
        text: `已保存「${title}」，共生成 ${personIds.length * companionIds.length} 组相关事项。`,
        time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
      });
      document.getElementById("scheduleTitle").value = "";
      save();
      render();
    });

    document.getElementById("feedbackForm").addEventListener("submit", event => {
      event.preventDefault();
      const text = document.getElementById("feedbackText").value.trim();
      if (!text) return;
      addFeedback(currentSpeakerId(), text);
      document.getElementById("feedbackText").value = "";
      save();
      render();
    });

    document.getElementById("routineForm").addEventListener("submit", event => {
      event.preventDefault();
      const ownerId = currentRoutineOwner();
      if (ownerId === "all") return;
      const title = document.getElementById("routineName").value.trim();
      if (!title) return;
      const location = document.getElementById("routineLocation").value;
      const routine = {
        title,
        time: document.getElementById("routineTime").value || "09:00",
        location,
        prep: document.getElementById("routinePrep").value.trim() || suggestPrep(title, location)
      };
      if (!dailyRoutines[ownerId]) {
        dailyRoutines[ownerId] = [];
      }
      if (state.editingRoutineIndex === null) {
        dailyRoutines[ownerId].push(routine);
      } else {
        dailyRoutines[ownerId][state.editingRoutineIndex] = routine;
      }
      resetRoutineForm();
      save();
      render();
    });

    document.getElementById("routineName").addEventListener("input", () => {
      const title = document.getElementById("routineName").value.trim();
      const location = document.getElementById("routineLocation").value;
      const prep = document.getElementById("routinePrep");
      if (!prep.value.trim() && title) {
        prep.placeholder = suggestPrep(title, location);
      }
    });

    document.getElementById("routineLocation").addEventListener("change", () => {
      const title = document.getElementById("routineName").value.trim();
      const prep = document.getElementById("routinePrep");
      if (!prep.value.trim() && title) {
        prep.placeholder = suggestPrep(title, document.getElementById("routineLocation").value);
      }
    });

    document.getElementById("routineAssignee").addEventListener("change", () => {
      state.editingRoutineIndex = null;
      render();
    });

    document.getElementById("generateAllBtn").addEventListener("click", generateAllRoutines);

    document.getElementById("showFeedbackBtn").addEventListener("click", () => {
      state.selectedMember = "mom";
      state.actionMode = "natural";
      render();
      document.getElementById("privateFeedbackHead").scrollIntoView({ behavior: "smooth", block: "start" });
    });

    document.getElementById("markFeedbackReadBtn").addEventListener("click", () => {
      state.feedbackReadAt = Date.now();
      save();
      render();
    });

    document.getElementById("mobileNav").addEventListener("click", event => {
      const button = event.target.closest("button[data-mobile-tab]");
      if (!button) return;
      if (button.dataset.mobileTab === "member") {
        document.getElementById("memberSheet").hidden = false;
        return;
      }
      state.mobileTab = button.dataset.mobileTab;
      if (state.mobileTab === "overview") state.selectedMember = "all";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.getElementById("closeMemberSheet").addEventListener("click", () => {
      document.getElementById("memberSheet").hidden = true;
    });

    document.getElementById("memberSheetBackdrop").addEventListener("click", () => {
      document.getElementById("memberSheet").hidden = true;
    });

    document.getElementById("closeOverviewSheet").addEventListener("click", () => {
      document.getElementById("overviewSheet").hidden = true;
    });

    document.getElementById("overviewSheetBackdrop").addEventListener("click", () => {
      document.getElementById("overviewSheet").hidden = true;
    });

    document.getElementById("actionTabs").addEventListener("click", event => {
      const button = event.target.closest("button[data-action-mode]");
      if (!button) return;
      state.actionMode = button.dataset.actionMode;
      render();
    });

    document.getElementById("filters").addEventListener("click", event => {
      const button = event.target.closest("button[data-filter], button[data-range]");
      if (!button) return;
      if (button.dataset.range) state.rangeMode = button.dataset.range;
      if (button.dataset.filter) state.filter = button.dataset.filter;
      render();
    });

    document.getElementById("viewSwitch").addEventListener("click", event => {
      const button = event.target.closest("button[data-view]");
      if (!button) return;
      state.viewMode = button.dataset.view;
      render();
    });

    checkPrepReminders();
    setInterval(checkPrepReminders, 60000);
  </script>
</body>
</html>
